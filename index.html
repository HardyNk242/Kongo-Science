    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Atkinson Hyperlegible", "Inter", system-ui, sans-serif;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .font-serif { font-family: "Crimson Pro", "Playfair Display", Georgia, serif; }
      .font-sans  { font-family: "Atkinson Hyperlegible", "Inter", system-ui, sans-serif; }

      /* Focus visible accessibility */
      :focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* Skip link (a11y) */
      .skip-link {
        position: absolute;
        top: -100px;
        left: 8px;
        background: #1e40af;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: 700;
        z-index: 9999;
        transition: top 0.2s;
      }
      .skip-link:focus { top: 8px; }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Animation de chargement simple */
      .loader-text {
        font-family: "Crimson Pro", serif;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>

    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    </head>

  <body class="bg-slate-50 text-slate-900 antialiased">

        <p style="color: #64748b;">Chargement de la bibliothèque scientifique...</p>
      </div>

  </body>
